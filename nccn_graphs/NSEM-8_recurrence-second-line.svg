<text xml:space="preserve" text-anchor="start" x="646.53" y="-288.5" font-family="Helvetica,sans-Serif" font-size="10.00">SECOND&#45;LINE THERAPY</text>
<text xml:space="preserve" text-anchor="start" x="646.53" y="-277.25" font-family="Helvetica,sans-Serif" font-size="10.00">• Clinical trial</text>
<text xml:space="preserve" text-anchor="start" x="646.53" y="-266" font-family="Helvetica,sans-Serif" font-size="10.00">• Chemotherapy:</text>
<text xml:space="preserve" text-anchor="start" x="646.53" y="-254.75" font-family="Helvetica,sans-Serif" font-size="10.00"> &#160;&#160;‣ Conventional&#45;dose (VeIP × 4 or TIP × 4)</text>
<text xml:space="preserve" text-anchor="start" x="646.53" y="-243.5" font-family="Helvetica,sans-Serif" font-size="10.00"> &#160;&#160;‣ High&#45;dose chemotherapy</text>
<text xml:space="preserve" text-anchor="start" x="646.53" y="-232.25" font-family="Helvetica,sans-Serif" font-size="10.00">• Consider surgery if resectable with normal/</text>
<text xml:space="preserve" text-anchor="start" x="646.53" y="-221" font-family="Helvetica,sans-Serif" font-size="10.00"> &#160;mildly elevated markers</text>
<text xml:space="preserve" text-anchor="start" x="646.53" y="-209.75" font-family="Helvetica,sans-Serif" font-size="10.00">• Recommend sperm banking</text>
