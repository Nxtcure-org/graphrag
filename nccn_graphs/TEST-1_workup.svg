<text xml:space="preserve" text-anchor="start" x="326.4" y="-54.11" font-family="Helvetica,sans-Serif" font-size="10.00">• Discuss sperm banking, if indicated</text>
<text xml:space="preserve" text-anchor="start" x="326.4" y="-42.86" font-family="Helvetica,sans-Serif" font-size="10.00">• Discuss testicular prosthesis</text>
<text xml:space="preserve" text-anchor="start" x="326.4" y="-31.61" font-family="Helvetica,sans-Serif" font-size="10.00">• If bilateral abnormalities: consider inguinal</text>
<text xml:space="preserve" text-anchor="start" x="326.4" y="-20.36" font-family="Helvetica,sans-Serif" font-size="10.00"> &#160;exploration of contralateral testis</text>
